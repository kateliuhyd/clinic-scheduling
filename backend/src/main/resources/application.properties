# ============================================
# ClinicConnect - Application Configuration
# ============================================

# Server
server.port=8080

# MySQL DataSource
spring.datasource.url=jdbc:mysql://localhost:3306/clinic_connect?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=ROOTROOT
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000

# Initialize schema on startup
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.continue-on-error=true

# Actuator (health endpoint)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# JWT Configuration
app.jwt.secret=ClinicConnectSecretKeyForJWTTokenGeneration2026VeryLongSecureKey
app.jwt.expiration-ms=86400000

# Logging
logging.level.com.clinicconnect=DEBUG
logging.level.org.springframework.jdbc=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Mock Notification Service
app.notification.base-url=http://localhost:8080/api/mock/notifications
